name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: "0"

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable (MSRV 1.70)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.70"
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-make
        uses: davidB/rust-cargo-make@v1

      - name: Format check
        run: cargo make fmt

      - name: Check workspace
        run: cargo make check

      - name: Clippy (-D warnings)
        run: cargo make clippy

      - name: Test workspace
        run: cargo make test

      - name: wasm32 build check
        run: cargo make wasm-check

      - name: C-ABI portability proof
        run: |
          cargo build --package wasm4games-capi --release
          # Verify the staticlib artifact exists (C-ABI portability proof)
          ls -lh target/release/libwasm4games_capi.a
