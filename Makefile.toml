[config]
skip_core_tasks = false
default_to_workspace = true

[env]
CARGO_INCREMENTAL = "0"
RUSTFLAGS = "-D warnings"

[tasks.check]
category = "Build"
description = "Verify workspace compiles"
command = "cargo"
args = ["check", "--workspace", "--all-targets", "--all-features"]

[tasks.build]
category = "Build"
description = "Build the workspace in release mode"
command = "cargo"
args = ["build", "--workspace", "--release", "--all-features"]

[tasks.test]
category = "Test"
description = "Run all workspace tests"
command = "cargo"
args = ["test", "--workspace", "--all-features", "--all-targets"]

[tasks.clippy]
category = "Lint"
description = "Run clippy with strict lints"
command = "cargo"
args = ["clippy", "--workspace", "--all-targets", "--all-features", "--", "-D", "warnings"]

[tasks.fmt]
category = "Lint"
description = "Check formatting"
command = "cargo"
args = ["fmt", "--all", "--", "--check"]

[tasks.audit]
category = "Security"
description = "Run cargo audit for vulnerabilities — last clean audit: 2026-06-21 (95 crates, 0 vulnerabilities)"
workspace = false
command = "cargo"
args = ["audit", "--no-fetch"]

[tasks.docs]
category = "Documentation"
description = "Build all documentation"
command = "cargo"
args = ["doc", "--workspace", "--all-features", "--no-deps", "--document-private-items"]

[tasks.clean]
category = "Cleanup"
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.wasm-build]
category = "Build"
description = "Build the wasm4games alloc-free core to wasm32 (no-default-features; compile only)"
workspace = false
command = "cargo"
args = ["build", "-p", "wasm4games", "--target", "wasm32-unknown-unknown", "--no-default-features"]

[tasks.wasm-check]
category = "Build"
description = "Compile the wasm4games alloc-free core to wasm32 (requires the target). Runtime execution requires wasmtime or wasmer — see scripts/wasm32_verify.sh"
workspace = false
dependencies = ["wasm-build"]

[tasks.ggen-sync]
category = "Codegen"
description = "Regenerate wasm4games kernels via ggen, then format (developer-only; requires ggen)"
workspace = false
script = [
    "cd crates/wasm4games/ggen && ggen sync",
    "cargo fmt -p wasm4games",
]

[tasks.fmt-fix]
category = "Lint"
description = "Apply formatting to all crates"
command = "cargo"
args = ["fmt", "--all"]

[tasks.portability-proof]
category = "Verification"
description = "Run the C-API portability proof script"
workspace = false
command = "bash"
args = ["crates/wasm4games-capi/portability_proof.sh"]

[tasks.test-no-std]
category = "Test"
description = "Test the no_std core without alloc or std"
workspace = false
command = "cargo"
args = ["test", "-p", "wasm4games", "--no-default-features"]

[tasks.test-std]
category = "Test"
description = "Test with alloc/std features enabled"
workspace = false
command = "cargo"
args = ["test", "-p", "wasm4games", "--features", "std"]

[tasks.ci]
category = "CI"
description = "Comprehensive CI pipeline"
dependencies = ["fmt", "check", "clippy", "test", "wasm-check", "portability-proof"]

[tasks.default]
alias = "ci"
