# ggen model for the wasm4games pattern foundry.
#
# `ggen sync` loads the RDF graph in [ontology], runs each rule's SPARQL query over it, renders
# the rule's Tera template with the result rows, and writes the result to `output_file`.
# The committed files under ../src/patterns/ are produced by these rules and checked in so
# the offline build never depends on ggen. Re-run `ggen sync` after editing schema/patterns.ttl.

# ---------------------------------------------------------------------------
# [project]
# ---------------------------------------------------------------------------
[project]
name = "wasm4games-patterns"
version = "1.0.0"
description = "Branchless game-pattern kernels and OCEL/OTEL evidence surface, generated from an RDF ontology."

# ---------------------------------------------------------------------------
# [ontology] — the single source of truth for all pattern metadata
# ---------------------------------------------------------------------------
# source: primary Turtle file (patterns.ttl holds all 75 w4g:Pattern individuals).
# imports: additional Turtle files merged into the same in-memory graph.
# base_iri: the default IRI prefix, matches the `w4g:` PREFIX in every .rq file.
[ontology]
source = "schema/patterns.ttl"
imports = ["schema/chains.ttl"]
base_iri = "https://wasm4games.dev/ontology#"

# ---------------------------------------------------------------------------
# [inference] — CONSTRUCT rules run before generation (DMAIC Measure phase)
# ---------------------------------------------------------------------------
# This rule infers w4g:isAntiCheat true on patterns whose id >= 71 (the five
# Anti-Cheat detector kernels 71-75). The generated kernels already special-case
# these by reading w4g:refusalStatus, but the inferred triple gives templates a
# clean boolean predicate without embedding numeric thresholds in Tera.
[inference]
[[inference.rules]]
name = "infer-anti-cheat-flag"
description = "Mark patterns 71-75 as Anti-Cheat detectors via inferred w4g:isAntiCheat triple"
order = 1
construct = """
PREFIX w4g: <https://wasm4games.dev/ontology#>
PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>

CONSTRUCT {
    ?pattern w4g:isAntiCheat true .
}
WHERE {
    ?pattern a w4g:Pattern ;
             w4g:id ?id .
    FILTER (?id >= 71)
}
"""

# ---------------------------------------------------------------------------
# [generation] — output root and per-rule code generation pipeline
# ---------------------------------------------------------------------------
# output_dir: all output_file paths are resolved relative to this directory,
#   which is the crate root (parent of ggen/).
[generation]
output_dir = ".."

# ---------------------------------------------------------------------------
# Rule: kernels — one file per pattern (fanout via {{ name }} in output_file)
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "kernels"
query = { file = "queries/kernels.rq" }
template = { file = "templates/kernel.rs.tera" }
output_file = "src/patterns/{{ name }}.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: patterns_mod — single file, no fanout
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "patterns_mod"
query = { file = "queries/pattern_index.rq" }
template = { file = "templates/patterns_mod.rs.tera" }
output_file = "src/patterns/mod.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: ocel_schema — single file, no fanout
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "ocel_schema"
query = { file = "queries/ocel_schema.rq" }
template = { file = "templates/ocel_schema.rs.tera" }
output_file = "src/evidence/ocel_schema.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: chain_tests — one file per JTBD chain (fanout via {{ chainName }})
# ---------------------------------------------------------------------------
[[generation.rules]]
name = "chain_tests"
query = { file = "queries/chains.rq" }
template = { file = "templates/chain_test.rs.tera" }
output_file = "src/chain_tests/{{ chainName }}.rs"
mode = "Overwrite"

# ---------------------------------------------------------------------------
# Rule: examples — one file per game scenario (fanout via {{ fileName }})
# ---------------------------------------------------------------------------
[[generation.rules]]
name     = "examples"
query    = { file = "queries/examples.rq" }
template = { file = "templates/example.rs.tera" }
output_file = "examples/{{ fileName }}.rs"
mode     = "Overwrite"
